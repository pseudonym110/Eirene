<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eirene</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --deep: #0d0d0d;
    --surface: #111111;
    --border: #2a2a2a;
    --muted: #333;
    --ash: #555;
    --silver: #888;
    --light: #bbb;
    --white: #f0f0f0;
    --gold: #ffffff;
    --gold-dim: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100vh;
    background: var(--black);
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeDown 1.2s ease both;
  }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--white);
    line-height: 1;
    margin-bottom: 20px;
  }

  h1 span { color: var(--gold); }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--silver), transparent);
    margin: 20px auto;
  }

  .tagline {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--silver);
    letter-spacing: 0.02em;
  }

  .quote {
    max-width: 560px;
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 1.4s ease 0.2s both;
  }

  .quote-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--ash);
    line-height: 1.8;
  }

  .quote-author {
    margin-top: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .input-area {
    width: 100%;
    max-width: 680px;
    margin-bottom: 40px;
    animation: fadeUp 1.4s ease 0.3s both;
  }

  .input-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--silver);
  }

  .input-row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.3s;
    background: var(--deep);
  }

  .input-row:focus-within { border-color: var(--gold-dim); }

  input[type="text"] {
    flex: 1;
    padding: 16px 20px;
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    letter-spacing: 0.03em;
    outline: none;
  }

  input::placeholder { color: var(--muted); font-style: italic; }

  button.play-btn {
    padding: 16px 28px;
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
    white-space: nowrap;
  }

  button.play-btn:hover { background: var(--gold); color: var(--black); }

  .error {
    margin-top: 10px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: #7a4040;
    display: none;
  }

  .player-section {
    width: 100%;
    max-width: 1200px;
    animation: fadeUp 0.6s ease both;
  }

  .video-meta {
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .now-playing {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .meta-line { flex: 1; height: 1px; background: var(--border); }

  .video-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--light);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    font-style: italic;
    min-height: 1.5em;
    transition: opacity 0.4s;
  }

  /* autoplay toggle */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .toggle-label {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    user-select: none;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 18px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--muted);
    border: 1px solid var(--border);
    transition: background 0.3s;
  }

  .toggle input:checked + .toggle-track { background: var(--silver); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    background: var(--black);
    transition: transform 0.3s;
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

  /* two-column layout */
  .player-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
    align-items: start;
  }

  .player-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border: 1px solid var(--border);
    position: relative;
  }

  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .player-wrap::before,
  .player-wrap::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--gold-dim);
    border-style: solid;
    z-index: 3;
    pointer-events: none;
  }
  .player-wrap::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .player-wrap::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  /* sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    background: var(--deep);
  }

  .sidebar-header {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-loading {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--ash);
    padding: 20px 14px;
    text-align: center;
  }

  .sidebar-item {
    display: flex;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }

  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { background: var(--surface); }

  .sidebar-thumb {
    width: 80px;
    height: 45px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--muted);
  }

  .sidebar-info { flex: 1; min-width: 0; }

  .sidebar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    color: var(--light);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .sidebar-channel {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    color: var(--ash);
    text-transform: uppercase;
  }

  .ornament {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-align: center;
    margin: 48px 0 32px;
  }

  .footer-quote { text-align: center; animation: fadeUp 1.6s ease 0.5s both; }
  .footer-quote a {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--silver);
    text-decoration: none;
    text-transform: lowercase;
    transition: color 0.2s;
  }
  .footer-quote a:hover { color: var(--white); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>Eir<span>ene</span></h1>
    <p class="tagline">Watch in peace.</p>
  </header>

  <div class="quote">
    <p class="quote-text" id="quoteText">"The eye sees only what the mind is prepared to comprehend."</p>
    <p class="quote-author" id="quoteAuthor">— Henri Bergson</p>
  </div>

  <div class="input-area">
    <label class="input-label" for="urlInput">Paste your link or video ID</label>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="youtube.com/watch?v=... or a raw ID" />
      <button class="play-btn" onclick="loadVideo()">Play</button>
    </div>
    <p class="error" id="error">The abyss could not find your video.</p>
  </div>

  <div class="player-section" id="playerSection" style="display:none">
    <div class="video-meta">
      <span class="now-playing">Now Playing</span>
      <div class="meta-line"></div>
    </div>
    <div class="video-title" id="videoTitle">—</div>

    <div class="controls-bar">
      <span class="toggle-label">Autoplay</span>
      <label class="toggle">
        <input type="checkbox" id="autoplayToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="player-layout">
      <div class="player-wrap">
        <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <div class="sidebar">
        <div class="sidebar-header">More from this channel</div>
        <div class="sidebar-loading" id="sidebarLoading">Loading...</div>
        <div id="sidebarList"></div>
      </div>
    </div>
  </div>

  <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

  <div class="footer-quote">
    <a href="https://beacons.ai/pseudonym101" target="_blank" rel="noopener noreferrer">beacons.ai/pseudonym101</a>
  </div>

</div>

<script>
  // Rotating quote
  const quotes = [
    { text: "The eye sees only what the mind is prepared to comprehend.", author: "Henri Bergson" },
    { text: "To see is to forget the name of the thing one sees.", author: "Paul Valéry" },
    { text: "All human beings by nature desire to know.", author: "Aristotle" },
    { text: "Attention is the rarest and purest form of generosity.", author: "Simone Weil" },
    { text: "The soul never thinks without a picture.", author: "Aristotle" },
    { text: "We don't see things as they are, we see them as we are.", author: "Anaïs Nin" },
    { text: "Wonder is the beginning of wisdom.", author: "Socrates" },
    { text: "The universe is under no obligation to make sense to you.", author: "Neil deGrasse Tyson" },
  ];
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quoteText').textContent = `"${q.text}"`;
  document.getElementById('quoteAuthor').textContent = `— ${q.author}`;

  const input = document.getElementById('urlInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') loadVideo(); });

  let currentChannelId = null;

  function extractVideoId(raw) {
    raw = raw.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
    try {
      const url = new URL(raw);
      if (url.hostname === 'youtu.be') return url.pathname.slice(1).split('?')[0];
      const v = url.searchParams.get('v');
      if (v) return v;
      const match = url.pathname.match(/\/(embed|shorts|v)\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[2];
    } catch (_) {}
    const fallback = raw.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
    return fallback ? fallback[1] : null;
  }

  async function fetchOembed(videoId) {
    try {
      const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  }

  // Fetch more videos from same channel via noembed + RSS
  async function fetchChannelVideos(channelId, excludeId) {
    try {
      const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=8`);
      if (!res.ok) return [];
      const data = await res.json();
      if (!data.items) return [];
      return data.items
        .filter(item => {
          const id = item.link.split('v=')[1];
          return id && id !== excludeId;
        })
        .slice(0, 6)
        .map(item => ({
          id: item.link.split('v=')[1],
          title: item.title,
          thumb: item.thumbnail || item.enclosure?.link || `https://i.ytimg.com/vi/${item.link.split('v=')[1]}/mqdefault.jpg`,
          channel: item.author,
        }));
    } catch { return []; }
  }

  function buildIframeSrc(videoId) {
    const autoplay = document.getElementById('autoplayToggle').checked;
    return `https://www.youtube.com/embed/${videoId}?autoplay=${autoplay ? 1 : 0}&rel=0&modestbranding=1${autoplay ? '&loop=1&playlist=' + videoId : ''}`;
  }

  function playVideoById(videoId) {
    const player = document.getElementById('player');
    player.src = buildIframeSrc(videoId);
  }

  function renderSidebar(videos) {
    const loading = document.getElementById('sidebarLoading');
    const list = document.getElementById('sidebarList');
    loading.style.display = 'none';
    list.innerHTML = '';

    if (!videos.length) {
      loading.textContent = 'No other videos found.';
      loading.style.display = 'block';
      return;
    }

    videos.forEach(v => {
      const item = document.createElement('div');
      item.className = 'sidebar-item';
      item.innerHTML = `
        <img class="sidebar-thumb" src="${v.thumb}" alt="" onerror="this.src='https://i.ytimg.com/vi/${v.id}/mqdefault.jpg'">
        <div class="sidebar-info">
          <div class="sidebar-title">${v.title}</div>
          <div class="sidebar-channel">${v.channel || ''}</div>
        </div>`;
      item.addEventListener('click', async () => {
        const titleEl = document.getElementById('videoTitle');
        titleEl.style.opacity = '0.3';
        titleEl.textContent = v.title;
        playVideoById(v.id);
        input.value = `https://www.youtube.com/watch?v=${v.id}`;
        titleEl.style.opacity = '1';
        // Refresh sidebar for new video
        loadSidebar(v.id, currentChannelId);
      });
      list.appendChild(item);
    });
  }

  async function loadSidebar(videoId, channelId) {
    const loading = document.getElementById('sidebarLoading');
    const list = document.getElementById('sidebarList');
    loading.textContent = 'Loading...';
    loading.style.display = 'block';
    list.innerHTML = '';

    if (!channelId) {
      loading.textContent = 'Channel not found.';
      return;
    }

    const videos = await fetchChannelVideos(channelId, videoId);
    renderSidebar(videos);
  }

  // Re-apply iframe src when toggle changes
  document.getElementById('autoplayToggle').addEventListener('change', () => {
    const player = document.getElementById('player');
    if (player.src && player.src.includes('youtube.com/embed')) {
      const match = player.src.match(/embed\/([a-zA-Z0-9_-]{11})/);
      if (match) player.src = buildIframeSrc(match[1]);
    }
  });

  async function loadVideo() {
    const raw = input.value;
    const videoId = extractVideoId(raw);
    const err = document.getElementById('error');
    const section = document.getElementById('playerSection');
    const titleEl = document.getElementById('videoTitle');

    if (!videoId) { err.style.display = 'block'; return; }
    err.style.display = 'none';

    titleEl.style.opacity = '0.3';
    titleEl.textContent = '—';

    playVideoById(videoId);
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const oembed = await fetchOembed(videoId);
    if (oembed) {
      titleEl.textContent = oembed.title || '—';
      // Extract channel id from author_url e.g. youtube.com/channel/UCxxxx
      const authorUrl = oembed.author_url || '';
      const chMatch = authorUrl.match(/\/channel\/(UC[a-zA-Z0-9_-]+)/);
      currentChannelId = chMatch ? chMatch[1] : null;
    } else {
      titleEl.textContent = '—';
      currentChannelId = null;
    }
    titleEl.style.opacity = '1';

    loadSidebar(videoId, currentChannelId);
  }
</script>
</body>
</html>
