<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff4444, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.sub {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 30px;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 30px;
  }

  input {
    flex: 1;
    padding: 14px 18px;
    border-radius: 10px;
    border: 2px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #ff4444; }
  input::placeholder { color: #555; }

  button {
    padding: 14px 24px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #ff4444, #ff6b35);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover { opacity: 0.9; transform: scale(1.02); }
  button:active { transform: scale(0.98); }

  .player-wrap {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16/9;
    border-radius: 14px;
    overflow: hidden;
    background: #1a1a1a;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .error {
    color: #ff6b6b;
    font-size: 0.9rem;
    margin-top: -18px;
    margin-bottom: 18px;
    display: none;
  }

  .tip {
    margin-top: 20px;
    color: #555;
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>

<h1>▶ YouTube Player</h1>
<p class="sub">Paste a YouTube link or video ID to watch without interruptions</p>

<div class="search-bar">
  <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=... or video ID" />
  <button onclick="loadVideo()">Play</button>
</div>

<p class="error" id="error">⚠️ Couldn't find a video ID. Please check your input.</p>

<div class="player-wrap" id="playerWrap">
  <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
</div>

<p class="tip">Supports youtube.com, youtu.be links, or raw video IDs</p>

<script>
  const input = document.getElementById('urlInput');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  function extractVideoId(raw) {
    raw = raw.trim();

    // Already an ID (11 chars, no spaces, no slashes)
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;

    try {
      const url = new URL(raw);

      // youtu.be/VIDEO_ID
      if (url.hostname === 'youtu.be') {
        return url.pathname.slice(1).split('?')[0];
      }

      // youtube.com/watch?v=VIDEO_ID
      const v = url.searchParams.get('v');
      if (v) return v;

      // youtube.com/embed/VIDEO_ID or /shorts/VIDEO_ID
      const match = url.pathname.match(/\/(embed|shorts|v)\/([a-zA-Z0-9_-]{11})/);
      if (match) return match[2];

    } catch (_) {}

    // Fallback regex
    const fallback = raw.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
    if (fallback) return fallback[1];

    return null;
  }

  function loadVideo() {
    const raw = input.value;
    const videoId = extractVideoId(raw);
    const err = document.getElementById('error');
    const wrap = document.getElementById('playerWrap');
    const player = document.getElementById('player');

    if (!videoId) {
      err.style.display = 'block';
      wrap.style.display = 'none';
      return;
    }

    err.style.display = 'none';
    // autoplay=1, rel=0 (no related ads), modestbranding=1
    player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
    wrap.style.display = 'block';
    wrap.scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
